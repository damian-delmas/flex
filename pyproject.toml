[project]
name = "flexsearch"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "numpy",
    "networkx",
    "scikit-learn",
]

[project.optional-dependencies]
embed = ["onnxruntime", "transformers"]
mcp = ["mcp", "starlette", "uvicorn"]
cluster = ["hdbscan"]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"
